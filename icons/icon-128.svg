<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Spotlight halo behind leader -->
  <circle cx="64" cy="40" r="34" fill="url(#spot)"/>

  <!-- Left pedestal (worker) -->
  <rect x="16" y="80" width="30" height="36" rx="3" fill="url(#side)"/>

  <!-- Right pedestal (worker) -->
  <rect x="82" y="80" width="30" height="36" rx="3" fill="url(#side)"/>

  <!-- Center pedestal (leader, tallest) -->
  <rect x="48" y="60" width="32" height="56" rx="3" fill="url(#center)"/>

  <!-- Left agent (small dot) -->
  <circle cx="31" cy="68" r="6" fill="#ede9fe"/>

  <!-- Right agent (small dot) -->
  <circle cx="97" cy="68" r="6" fill="#ede9fe"/>

  <!-- Center agent (leader — bright, larger) -->
  <circle cx="64" cy="42" r="9" fill="#fef9c3"/>

  <!-- Floor line -->
  <rect x="8" y="114" width="112" height="3" rx="1.5" fill="#4c1d95" opacity="0.6"/>
</svg>
