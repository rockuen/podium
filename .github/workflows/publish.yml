name: Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx vsce package --target ${{ matrix.target }} --no-git-tag-version --allow-missing-repository
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g ovsx @vscode/vsce
      - name: Publish to Open VSX
        run: |
          for f in *.vsix; do
            echo "Publishing $f..."
            ovsx publish "$f" -p ${{ secrets.OVSX_TOKEN }}
          done
      - name: Publish to VS Code Marketplace
        if: secrets.VSCE_TOKEN != ''
        run: |
          for f in *.vsix; do
            vsce publish --packagePath "$f" -p ${{ secrets.VSCE_TOKEN }}
          done
        continue-on-error: true
