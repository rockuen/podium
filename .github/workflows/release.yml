name: Release Podium

# Tag-driven release. Push a `vX.Y.Z` tag whose value matches
# `package.json`'s "version" and this workflow will:
#   1. Build + package the extension as `podium-X.Y.Z.vsix`.
#   2. Create a GitHub Release and attach the VSIX.
#   3. Publish to OpenVSX (only when the OVSX_PAT secret is set —
#      missing secret skips that step gracefully so users without an
#      OpenVSX namespace yet still get the GitHub Release).
#
# Secrets required:
#   - GITHUB_TOKEN  (provided automatically by Actions)
#   - OVSX_PAT      (user-managed; create at https://open-vsx.org → User
#                    Settings → Access Tokens, then add to this repo's
#                    Settings → Secrets and variables → Actions).
#
# Branch policy: any branch can produce a release because the trigger is
# the tag, not the branch. Recommended workflow is to merge to master
# first, then `git tag vX.Y.Z && git push origin vX.Y.Z`.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build, release, publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package.json version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::Tag $TAG does not match package.json version $EXPECTED"
            exit 1
          fi
          echo "Tag matches: $TAG"

      - name: Run unit tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Package VSIX
        run: npm run package

      - name: Verify VSIX exists
        run: |
          VSIX="podium-${{ steps.pkg.outputs.version }}.vsix"
          if [ ! -f "$VSIX" ]; then
            echo "::error::Expected $VSIX not found after packaging"
            ls -la *.vsix || true
            exit 1
          fi
          echo "VSIX ready: $(ls -lh "$VSIX")"

      - name: Create GitHub Release + attach VSIX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "podium-${{ steps.pkg.outputs.version }}.vsix" \
            --title "Podium ${{ steps.pkg.outputs.version }}" \
            --generate-notes

      - name: Publish to OpenVSX (skipped if OVSX_PAT not set)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT secret not configured — skipping OpenVSX publish."
            echo "To enable: add OVSX_PAT to repo Settings → Secrets → Actions."
            exit 0
          fi
          npx --yes ovsx publish "podium-${{ steps.pkg.outputs.version }}.vsix" -p "$OVSX_PAT"
          echo "Published to OpenVSX: rockuen.podium@${{ steps.pkg.outputs.version }}"
